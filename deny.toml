[advisories]
db-path = '~/.cargo/advisory-db'
db-urls = ['https://github.com/rustsec/advisory-db']
# Deny known security vulnerabilities and unmaintained crates
vulnerability = 'deny'
unmaintained = 'warn'
yanked = 'warn'
notice = 'warn'

[licenses]
# Allow all commonly used open source licenses
allow = [
    'MIT',
    'Apache-2.0',
    'Apache-2.0 WITH LLVM-exception',
    'BSD-2-Clause',
    'BSD-3-Clause',
    'ISC',
    'Unicode-DFS-2016',
    'Zlib',
    'CC0-1.0',
    'OpenSSL',
]
copyleft = 'warn'
allow-osi-fsf-free = 'either'
default = 'deny'
private = { ignore = true }

[bans]
multiple-versions = 'warn'
wildcards = 'allow'
highlight = 'all'

[sources]
unknown-registry = 'warn'
unknown-git = 'warn'
allow-registry = ['https://github.com/rust-lang/crates.io-index']
