[workspace]
members = ["crates/proxy-contract-tests", "crates/worker-protocol"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/ericflo/llm-worker-proxy"
rust-version = "1.94"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
