name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: darwin-arm64
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-amd64
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-arm64
            cross: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build modelrelay-server
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p modelrelay-server
          else
            cargo build --release --target ${{ matrix.target }} -p modelrelay-server
          fi
        shell: bash

      - name: Build modelrelay-worker
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p modelrelay-worker
          else
            cargo build --release --target ${{ matrix.target }} -p modelrelay-worker
          fi
        shell: bash

      - name: Stage binaries
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/modelrelay-server.exe dist/modelrelay-server-${{ matrix.artifact_suffix }}.exe
            cp target/${{ matrix.target }}/release/modelrelay-worker.exe dist/modelrelay-worker-${{ matrix.artifact_suffix }}.exe
          else
            cp target/${{ matrix.target }}/release/modelrelay-server dist/modelrelay-server-${{ matrix.artifact_suffix }}
            cp target/${{ matrix.target }}/release/modelrelay-worker dist/modelrelay-worker-${{ matrix.artifact_suffix }}
          fi
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: dist/

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish -p modelrelay-protocol --no-verify
          sleep 30
          cargo publish -p modelrelay-server --no-verify
          cargo publish -p modelrelay-worker --no-verify

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF_NAME}
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG..$CURRENT_TAG" --no-merges | head -50)
          else
            NOTES=$(git log --oneline --no-merges | head -50)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Binaries

            Pre-built binaries are attached below. Download the one matching your platform:

            | Binary | Platform |
            |--------|----------|
            | `modelrelay-server-linux-amd64` | Linux x86_64 |
            | `modelrelay-server-linux-arm64` | Linux arm64 |
            | `modelrelay-server-darwin-amd64` | macOS Intel |
            | `modelrelay-server-darwin-arm64` | macOS Apple Silicon |
            | `modelrelay-server-windows-amd64.exe` | Windows x86_64 |
            | `modelrelay-server-windows-arm64.exe` | Windows arm64 |
            | `modelrelay-worker-linux-amd64` | Linux x86_64 |
            | `modelrelay-worker-linux-arm64` | Linux arm64 |
            | `modelrelay-worker-darwin-amd64` | macOS Intel |
            | `modelrelay-worker-darwin-arm64` | macOS Apple Silicon |
            | `modelrelay-worker-windows-amd64.exe` | Windows x86_64 |
            | `modelrelay-worker-windows-arm64.exe` | Windows arm64 |

            ## Changes since previous release

            ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
