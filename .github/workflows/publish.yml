name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        if: env.HAS_TOKEN == 'true'
        run: rustup show

      - name: Publish modelrelay-protocol
        if: env.HAS_TOKEN == 'true'
        run: cargo publish -p modelrelay-protocol
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for crates.io indexing
        if: env.HAS_TOKEN == 'true'
        run: sleep 30

      - name: Publish modelrelay-server
        if: env.HAS_TOKEN == 'true'
        run: cargo publish -p modelrelay-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for crates.io indexing
        if: env.HAS_TOKEN == 'true'
        run: sleep 30

      - name: Publish modelrelay-worker
        if: env.HAS_TOKEN == 'true'
        run: cargo publish -p modelrelay-worker
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Skip notice
        if: env.HAS_TOKEN != 'true'
        run: echo "CRATES_IO_TOKEN not configured — skipping publish"
