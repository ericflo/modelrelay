<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subscription Active — ModelRelay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117; color: #e6edf3; line-height: 1.6;
    }
    a { color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 24px; }

    nav { padding: 20px 0; border-bottom: 1px solid #21262d; }
    nav .container { max-width: 1100px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.25rem; font-weight: 700; color: #e6edf3; }
    .logo span { color: #7c3aed; }

    .content { padding: 100px 0; text-align: center; }
    .check { font-size: 4rem; margin-bottom: 16px; }
    .content h1 { font-size: 2rem; margin-bottom: 16px; }
    .content p { color: #8b949e; font-size: 1.1rem; margin-bottom: 32px; }
    .btn {
      display: inline-block; padding: 14px 36px; background: #7c3aed; color: #fff;
      border-radius: 8px; font-size: 1.1rem; font-weight: 600; transition: background 0.2s;
    }
    .btn:hover { background: #6d28d9; text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">Model<span>Relay</span></a>
    </div>
  </nav>

  <section class="content">
    <div class="container">
      <div class="check">&#10003;</div>
      <h1>Subscription Active</h1>
      <p>Your ModelRelay subscription is being set up. You'll receive an email with your API key and connection details shortly.</p>
      <a class="btn" href="/dashboard">Go to Dashboard &rarr;</a>
    </div>
  </section>
</body>
</html>
