# nginx reverse proxy configuration for ModelRelay with TLS termination.
#
# This puts HTTPS in front of proxy-server so that:
#   - Clients connect via https://your-domain.example.com/v1/...
#   - Workers connect via wss://your-domain.example.com/v1/worker/connect
#   - nginx terminates TLS; proxy-server listens on plain HTTP internally.
#
# Usage:
#   1. Replace your-domain.example.com with your actual domain.
#   2. Set ssl_certificate / ssl_certificate_key to your cert paths
#      (e.g. from Let's Encrypt).
#   3. Start proxy-server on 127.0.0.1:8080 (the default).
#   4. Test: nginx -t && systemctl reload nginx
#
# For Let's Encrypt:
#   certbot certonly --nginx -d your-domain.example.com

upstream proxy_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    # --- TLS certificates ---
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    # --- TLS hardening ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Worker WebSocket endpoint ---
    # Workers connect here: wss://your-domain.example.com/v1/worker/connect
    location /v1/worker/connect {
        proxy_pass http://proxy_backend;

        # WebSocket upgrade headers (required)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived; disable timeouts.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Inference API endpoints ---
    # Clients send requests here: https://your-domain.example.com/v1/...
    location /v1/ {
        proxy_pass http://proxy_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming (SSE) responses.
        proxy_buffering off;
        proxy_cache off;

        # Allow long-running inference requests (match REQUEST_TIMEOUT_SECS).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
