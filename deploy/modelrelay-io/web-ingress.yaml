apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: modelrelay
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: public
  tls:
    - hosts:
        - modelrelay.io
        - www.modelrelay.io
      secretName: modelrelay-tls
  rules:
    - host: modelrelay.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
    - host: www.modelrelay.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8000
