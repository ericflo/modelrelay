apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: modelrelay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: server
          image: ghcr.io/ericflo/modelrelay/modelrelay-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:8080"
            - name: MODELRELAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: modelrelay-cloud
                  key: MODELRELAY_ADMIN_TOKEN
            - name: WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: modelrelay-cloud
                  key: WORKER_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: modelrelay-cloud
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
        - name: regcred
