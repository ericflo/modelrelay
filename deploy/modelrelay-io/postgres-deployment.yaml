apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: modelrelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: modelrelay
            - name: POSTGRES_USER
              value: modelrelay
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: modelrelay-cloud
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres
